spring:
    application:
        name: identity-service
    profiles:
        active: dev

server:
    port: ${PORT:8080}

security:
    jwt:
        secret: ${JWT_SECRET:default-secret}
        expiration: 3600000
        refresh-token-expiration: 604800
        access-token-expiration: 900000

logging:
    pattern:
        console: "%d{yyyy-MM-dd HH:mm:ss} [%X{correlationId}] %-5level %logger{36} - %msg%n"
